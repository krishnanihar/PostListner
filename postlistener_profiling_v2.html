<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>PostListener · Profiling v2 · The 5-minute Separation Rite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet" />
<style>
  :root{
    --obsidian:#0a0a0c;
    --obsidian-2:#14141a;
    --slate:#2a2d35;
    --slate-2:#3d4148;
    --ash:#6b6b73;
    --bone:#e8e4dc;
    --bone-dim:#a6a39c;
    --ember:#c97a4a;
    --ember-deep:#a05828;
    --ember-glow:rgba(201,122,74,0.18);
    --ok:#7a9b6e;
    --display: 'Fraunces', 'Times New Roman', serif;
    --mono: 'JetBrains Mono', 'Menlo', monospace;
    --body: 'Fraunces', 'Times New Roman', serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--obsidian);
    color:var(--bone);
    font-family:var(--body);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  /* ambient grain */
  body::before{
    content:"";
    position:fixed;inset:0;
    pointer-events:none;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,122,74,0.04), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,122,74,0.025), transparent 50%);
    mix-blend-mode:screen;
    z-index:1;
  }
  body::after{
    content:"";
    position:fixed;inset:0;
    pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.89 0 0 0 0 0.86 0 0 0 0.06 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    opacity:0.4;
    mix-blend-mode:overlay;
    z-index:2;
  }

  /* — top bar — */
  .topbar{
    position:fixed;top:0;left:0;right:0;
    padding:18px 28px;
    display:flex;align-items:center;justify-content:space-between;
    z-index:50;
    pointer-events:none;
  }
  .brand{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    pointer-events:auto;
  }
  .brand strong{color:var(--bone);font-weight:500}
  .timeline{
    display:flex;align-items:center;gap:8px;
    pointer-events:auto;
  }
  .tl-step{
    width:34px;height:2px;
    background:var(--slate);
    transition:background 0.6s ease;
    cursor:pointer;
    position:relative;
  }
  .tl-step.done{background:var(--ember-deep)}
  .tl-step.active{background:var(--ember)}
  .tl-step::after{
    content:attr(data-label);
    position:absolute;top:10px;left:0;
    font-family:var(--mono);
    font-size:8.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ash);
    white-space:nowrap;
    opacity:0;transition:opacity 0.3s;
  }
  .tl-step.active::after{opacity:1;color:var(--bone-dim)}
  .timer{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.14em;
    color:var(--ash);
    pointer-events:auto;
    font-variant-numeric:tabular-nums;
  }

  /* — stage — */
  .stage{
    position:relative;
    min-height:100vh;
    width:100%;
    display:flex;align-items:center;justify-content:center;
    padding:80px 24px 100px;
    z-index:5;
  }

  /* — phase: threshold — */
  .threshold{
    text-align:center;
    max-width:560px;
  }
  .threshold .name{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:clamp(40px,6vw,72px);
    font-variation-settings:'opsz' 144;
    letter-spacing:-0.01em;
    color:var(--bone);
    margin-bottom:48px;
    opacity:0;
    animation:slowFade 2.4s ease-out forwards;
  }
  .breath-ring{
    width:200px;height:200px;margin:0 auto 36px;
    position:relative;
    opacity:0;
    animation:slowFade 2s 1s ease-out forwards;
  }
  .breath-ring svg{transform:rotate(-90deg);width:100%;height:100%}
  .breath-ring .bg{stroke:var(--slate);stroke-width:1;fill:none}
  .breath-ring .fg{
    stroke:var(--ember);
    stroke-width:1.4;
    fill:none;
    stroke-dasharray:565;
    stroke-dashoffset:565;
  }
  .breath-ring.active .fg{
    animation:exhale 6s ease-in-out infinite;
  }
  .breath-ring .pulse{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);
    font-size:9px;letter-spacing:0.24em;
    text-transform:uppercase;
    color:var(--bone-dim);
  }
  @keyframes exhale{
    0%{stroke-dashoffset:565;}
    50%{stroke-dashoffset:0;}
    100%{stroke-dashoffset:565;}
  }
  .voice-line{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:22px;
    line-height:1.5;
    color:var(--bone);
    max-width:440px;
    margin:0 auto;
    opacity:0;
  }
  .voice-line.show{animation:rise 1.6s ease-out forwards}
  @keyframes rise{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes slowFade{
    from{opacity:0}
    to{opacity:0.94}
  }
  .threshold-instructions{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ash);
    margin-top:28px;
    opacity:0;
    animation:slowFade 1.6s 3s ease-out forwards;
  }

  /* — phase: pairwise — */
  .pairwise{
    width:100%;max-width:980px;
  }
  .pair-counter{
    text-align:center;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:14px;
  }
  .pair-counter strong{color:var(--ember)}
  .pair-prompt{
    text-align:center;
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:28px;
    color:var(--bone);
    margin-bottom:54px;
    opacity:0.85;
  }
  .pair-cards{
    display:grid;grid-template-columns:1fr 1fr;
    gap:36px;
  }
  .pair-card{
    background:var(--obsidian-2);
    border:1px solid var(--slate);
    aspect-ratio:1.05/1;
    cursor:pointer;
    display:flex;flex-direction:column;justify-content:space-between;
    padding:32px;
    position:relative;
    overflow:hidden;
    transition:border-color 0.4s ease, transform 0.4s ease;
  }
  .pair-card:hover{
    border-color:var(--ember);
    transform:translateY(-2px);
  }
  .pair-card.chosen{
    border-color:var(--ember);
    background:linear-gradient(135deg, var(--obsidian-2), rgba(201,122,74,0.06));
  }
  .pair-card .label{
    font-family:var(--mono);
    font-size:9.5px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
  }
  .pair-card.chosen .label{color:var(--ember)}
  .pair-card .descriptor{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:32px;
    line-height:1.1;
    color:var(--bone);
  }
  .waveform{
    width:100%;height:60px;
    display:flex;align-items:center;gap:2px;
  }
  .waveform .bar{
    flex:1;background:var(--ash);
    transition:background 0.6s, height 0.4s;
    transform-origin:center;
  }
  .pair-card:hover .bar{background:var(--bone-dim)}
  .pair-card.chosen .bar{background:var(--ember)}

  /* — phase: gems probe — */
  .gems{
    width:100%;max-width:760px;
    text-align:center;
  }
  .excerpt-counter{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:14px;
  }
  .excerpt-counter strong{color:var(--ember)}
  .gems-prompt{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:28px;
    color:var(--bone);
    margin-bottom:42px;
  }
  .visualizer{
    width:300px;height:300px;margin:0 auto 42px;
    position:relative;
  }
  .visualizer svg{width:100%;height:100%}
  .vis-ring{
    fill:none;
    stroke:var(--ember);
    stroke-width:0.6;
    transform-origin:center;
  }
  .visualizer.playing .vis-ring{
    animation:pulse 3.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:0.15;transform:scale(0.95)}
    50%{opacity:0.55;transform:scale(1.04)}
  }
  .visualizer .center-label{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);
    font-size:9px;letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--bone-dim);
  }
  .tile-prompt{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:18px;
    opacity:0;transition:opacity 0.4s;
  }
  .tile-prompt.show{opacity:1}
  .tile-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:12px;
    max-width:520px;margin:0 auto;
    opacity:0;
    transition:opacity 0.4s;
  }
  .tile-grid.show{opacity:1}
  .tile{
    background:var(--obsidian-2);
    border:1px solid var(--slate);
    padding:16px 12px;
    cursor:pointer;
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:18px;
    color:var(--bone-dim);
    transition:all 0.3s ease;
  }
  .tile:hover{border-color:var(--ember-deep);color:var(--bone)}
  .tile.selected{border-color:var(--ember);color:var(--ember);background:rgba(201,122,74,0.06)}
  .tile-fade-bar{
    width:520px;max-width:100%;
    height:1px;background:var(--slate);
    margin:18px auto 0;
    position:relative;overflow:hidden;
    opacity:0;transition:opacity 0.4s;
  }
  .tile-fade-bar.show{opacity:1}
  .tile-fade-bar .fill{
    position:absolute;left:0;top:0;height:100%;
    background:var(--ember);
    width:100%;
    animation:countdown 6s linear forwards;
  }
  @keyframes countdown{
    from{width:100%}
    to{width:0}
  }

  /* — phase: three songs — */
  .threesongs{
    width:100%;max-width:560px;
  }
  .ts-eyebrow{
    text-align:center;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:14px;
  }
  .ts-eyebrow strong{color:var(--ember)}
  .ts-prompt{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:30px;
    line-height:1.3;
    color:var(--bone);
    text-align:center;
    margin-bottom:48px;
    min-height:80px;
  }
  .ts-input-wrap{
    border-bottom:1px solid var(--slate);
    padding-bottom:14px;
    margin-bottom:32px;
    transition:border-color 0.3s;
  }
  .ts-input-wrap:focus-within{border-color:var(--ember)}
  .ts-input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:22px;
    color:var(--bone);
    padding:8px 0;
  }
  .ts-input::placeholder{
    color:var(--ash);
    font-style:italic;
  }
  .ts-meta{
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ash);
    margin-top:6px;
  }
  .ts-voice{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:14px;
    color:var(--bone-dim);
    text-align:center;
    margin-top:36px;
    opacity:0.7;
  }

  /* — phase: moment (tap-along + liking) — */
  .moment{
    width:100%;max-width:680px;
    text-align:center;
  }
  .mom-eyebrow{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:14px;
  }
  .mom-eyebrow strong{color:var(--ember)}
  .mom-prompt{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:28px;
    line-height:1.3;
    color:var(--bone);
    margin-bottom:54px;
  }
  .mom-tap-zone{
    width:100%;
    aspect-ratio:2.4/1;
    border:1px solid var(--slate);
    background:var(--obsidian-2);
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:border-color 0.4s, background 0.4s;
    user-select:none;
  }
  .mom-tap-zone:hover{border-color:var(--ember-deep)}
  .mom-tap-zone.tapping{border-color:var(--ember)}
  .mom-tap-zone .tap-instruction{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;
    z-index:3;
  }
  .mom-tap-zone .tap-bpm{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-variation-settings:'opsz' 144;
    font-size:64px;
    color:var(--bone);
    line-height:1;
    margin-bottom:8px;
  }
  .mom-tap-zone .tap-bpm-label{
    font-family:var(--mono);
    font-size:9px;letter-spacing:0.24em;color:var(--ash);
    text-transform:uppercase;
  }
  .mom-tap-zone .tap-hint{
    font-family:var(--mono);
    font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
    color:var(--bone-dim);
    margin-top:10px;
  }
  .mom-tap-pulse{
    position:absolute;left:50%;top:50%;
    width:16px;height:16px;
    background:var(--ember);
    border-radius:50%;
    transform:translate(-50%,-50%);
    opacity:0;
    pointer-events:none;
  }
  .mom-tap-pulse.flash{animation:tapPulse 0.4s ease-out}
  @keyframes tapPulse{
    0%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(10)}
  }
  .mom-track-meta{
    margin-top:18px;
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ash);
  }
  .mom-track-meta strong{color:var(--ember-deep)}
  .mom-voice-line{
    margin-top:28px;
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:14px;
    color:var(--bone-dim);
    opacity:0.7;
  }
  .mom-liking{
    margin-top:48px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.6s;
  }
  .mom-liking.show{opacity:1;pointer-events:auto}
  .mom-liking-prompt{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:22px;
    color:var(--bone);
    margin-bottom:24px;
  }
  .mom-liking-scale{
    display:flex;justify-content:center;gap:10px;
  }
  .mom-liking-dot{
    width:38px;height:38px;
    border-radius:50%;
    border:1px solid var(--slate);
    background:transparent;
    cursor:pointer;
    font-family:var(--mono);
    font-size:11px;
    color:var(--bone-dim);
    transition:all 0.3s;
  }
  .mom-liking-dot:hover{border-color:var(--ember-deep);color:var(--bone)}
  .mom-liking-dot.chosen{border-color:var(--ember);color:var(--ember);background:rgba(201,122,74,0.06)}
  .mom-liking-anchors{
    display:flex;justify-content:space-between;
    margin:16px auto 0;
    max-width:520px;
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--ash);
  }

  /* — library coverage indicator (in notes drawer) — */
  .lib-coverage{
    margin-top:32px;
    padding-top:24px;
    border-top:1px solid var(--slate);
  }
  .lib-coverage h4{
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--ember);
    margin-bottom:14px;
    font-weight:500;
  }
  .lib-summary{
    font-family:var(--mono);
    font-size:10px;
    color:var(--bone-dim);
    margin-bottom:14px;
    letter-spacing:0.06em;
    line-height:1.6;
  }
  .lib-summary strong{color:var(--bone)}
  .arc-list{
    list-style:none;
    padding:0;
    margin:0;
  }
  .arc-list li{
    display:flex;align-items:center;gap:10px;
    margin-bottom:6px;
    font-family:var(--mono);
    font-size:9.5px;
    letter-spacing:0.04em;
    color:var(--bone-dim);
    padding:7px 8px;
    border-left:2px solid var(--slate);
    transition:all 0.4s;
  }
  .arc-list li.viable{border-left-color:var(--ember-deep);color:var(--bone)}
  .arc-list li.leading{border-left-color:var(--ember);color:var(--ember);background:rgba(201,122,74,0.04)}
  .arc-list li.pruned{opacity:0.35;text-decoration:line-through}
  .arc-list .arc-name{
    flex:1;text-transform:none;
    font-style:italic;font-family:var(--display);
    font-size:13px;letter-spacing:0;
  }
  .arc-list .arc-score{
    font-variant-numeric:tabular-nums;
    color:inherit;
  }

  /* — divergence note — */
  .divergence{
    margin-top:24px;
    padding:14px;
    border:1px dashed var(--slate);
    background:rgba(201,122,74,0.02);
  }
  .divergence h4{
    font-family:var(--mono);
    font-size:9px;
    letter-spacing:0.2em;
    color:var(--ember);
    text-transform:uppercase;
    font-weight:500;
    margin-bottom:8px;
  }
  .divergence p{
    font-family:var(--display);
    font-style:italic;
    font-size:12.5px;
    line-height:1.55;
    color:var(--bone-dim);
  }

  /* — phase: mirror — */
  .mirror{
    width:100%;max-width:620px;
    text-align:center;
  }
  .mirror-eyebrow{
    font-family:var(--mono);
    font-size:9.5px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--ember);
    margin-bottom:32px;
    opacity:0;
  }
  .mirror-archetype{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-variation-settings:'opsz' 144;
    font-size:clamp(48px,7vw,82px);
    line-height:1.05;
    color:var(--bone);
    margin-bottom:14px;
    opacity:0;
  }
  .mirror-variation{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--bone-dim);
    margin-bottom:64px;
    opacity:0;
  }
  .mirror-divider{
    width:48px;height:1px;
    background:var(--ember);
    margin:0 auto 64px;
    opacity:0;
  }
  .mirror-line{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:20px;
    line-height:1.6;
    color:var(--bone);
    margin-bottom:18px;
    opacity:0;
  }
  .mirror-line.dim{color:var(--bone-dim)}
  .mirror-handoff{
    font-family:var(--display);
    font-style:italic;
    font-weight:400;
    font-size:24px;
    color:var(--ember);
    margin-top:64px;
    opacity:0;
  }
  .reveal-1{animation:rise 1.6s 0.2s ease-out forwards}
  .reveal-2{animation:rise 1.6s 1.2s ease-out forwards}
  .reveal-3{animation:rise 1.6s 2.0s ease-out forwards}
  .reveal-4{animation:fadeIn 1.4s 3.2s ease-out forwards}
  .reveal-5{animation:rise 1.4s 4.4s ease-out forwards}
  .reveal-6{animation:rise 1.4s 5.6s ease-out forwards}
  .reveal-7{animation:rise 1.4s 6.8s ease-out forwards}
  .reveal-8{animation:rise 1.4s 8.0s ease-out forwards}
  .reveal-9{animation:rise 1.4s 9.2s ease-out forwards}
  .reveal-10{animation:rise 1.4s 10.4s ease-out forwards}
  .reveal-11{animation:rise 2s 11.6s ease-out forwards}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* — controls — */
  .controls{

  if(state.phase===4) wrap.appendChild(renderMoment());
  if(state.phase===5) wrap.appendChild(renderMirror());
  stage.appendChild(wrap);
  updateTimeline();
  updateNotes();
  updateControls();
}

function renderPairwise(){
  const pair = PAIRS[state.currentPair];
  const root = document.createElement('div');
  root.className='pairwise';
  root.innerHTML = `
    <div class="pair-counter">PAIR <strong>${state.currentPair+1}</strong> / ${PAIRS.length}  ·  THE FIRST PULL</div>
    <h2 class="pair-prompt">Which one would you keep?</h2>
    <div class="pair-cards">
      <div class="pair-card" data-side="a">
        <div class="label">${pair.a.label}</div>
        <div class="waveform" data-shape="${pair.a.shape}"></div>
        <div class="descriptor">${pair.a.desc}</div>
      </div>
      <div class="pair-card" data-side="b">
        <div class="label">${pair.b.label}</div>
        <div class="waveform" data-shape="${pair.b.shape}"></div>
        <div class="descriptor">${pair.b.desc}</div>
      </div>
    </div>
  `;
  // generate waveforms
  setTimeout(()=>{
    root.querySelectorAll('.waveform').forEach(wf=>{
      const shape = wf.dataset.shape;
      const bars = 36;
      let html='';
      for(let i=0;i<bars;i++){
        let h = wfHeight(shape, i, bars);
        html += `<div class="bar" style="height:${h}%"></div>`;
      }
      wf.innerHTML = html;
    });
    state.pairShownAt = performance.now();        // start latency clock
    root.querySelectorAll('.pair-card').forEach(card=>{
      card.addEventListener('click',()=>{
        const latency = performance.now() - state.pairShownAt;
        state.pairLatencies[state.currentPair] = latency;
        root.querySelectorAll('.pair-card').forEach(c=>c.classList.remove('chosen'));
        card.classList.add('chosen');
        state.pairChoices[state.currentPair] = card.dataset.side;
        setTimeout(()=>{
          if(state.currentPair < PAIRS.length-1){
            state.currentPair++;
            render();
          } else {
            state.phase = 2;
            render();
          }
        }, 800);
      });
    });
  }, 30);
  return root;
}

function wfHeight(shape, i, n){
  const t = i/n;
  switch(shape){
    case 'low':     return 20 + 50*Math.sin(t*Math.PI*2)*Math.exp(-t*0.6);
    case 'high':    return 35 + 35*Math.sin(t*Math.PI*8);
    case 'thick':   return 55 + 35*Math.sin(t*Math.PI*12)*Math.cos(t*Math.PI*3);
    case 'thin':    return 15 + 25*Math.sin(t*Math.PI*4);
    case 'mid':     return 30 + 40*Math.sin(t*Math.PI*5);
    case 'flat':    return 25 + 8*Math.sin(t*Math.PI*15);
    case 'organic': return 25 + 35*Math.sin(t*Math.PI*3) + 12*Math.sin(t*Math.PI*9);
    case 'crystal': return 45 + 30*Math.abs(Math.sin(t*Math.PI*6));
    case 'rising':  return 15 + 70*t + 10*Math.sin(t*Math.PI*8);
    case 'falling': return 75 - 60*t + 10*Math.sin(t*Math.PI*8);
    case 'sparse':  return 20 + 30*(i%6===0?1:0.3);
    case 'steady':  return 40 + 20*Math.sin(t*Math.PI*8);
    case 'urgent':  return 50 + 35*Math.abs(Math.sin(t*Math.PI*16));
    case 'drift':   return 35 + 15*Math.sin(t*Math.PI*1.5);
    case 'deep':    return 60 + 25*Math.sin(t*Math.PI*2.5);
    case 'bright':  return 25 + 35*Math.sin(t*Math.PI*14);
    case 'wet':     return 35 + 35*Math.sin(t*Math.PI*4)*Math.exp(-t*0.4);
    case 'tight':   return 50 + 15*Math.sin(t*Math.PI*20);
    default:        return 30 + 30*Math.sin(t*Math.PI*4);
  }
}

function renderMoment(){
  // Provisional archetype is computed from prior phases — used to frame
  // the voice line ("auditioning a track for you") and gives operational
  // transparency: the system shows it's already considering a candidate.
  const provisional = computeProvisionalArchetype();
  const root = document.createElement('div');
  root.className='moment';
  root.innerHTML = `
    <div class="mom-eyebrow">PHASE <strong>4</strong> · MOMENT  ·  THE AUDITION</div>
    <h2 class="mom-prompt">Tap with this — find the pulse you want.</h2>
    <div class="mom-tap-zone" id="tapZone">
      <div class="mom-tap-pulse" id="tapPulse"></div>
      <div class="tap-instruction">
        <div class="tap-bpm" id="tapBPM">— —</div>
        <div class="tap-bpm-label">BPM · TAP TO BEGIN</div>
        <div class="tap-hint" id="tapHint">TAP HERE · ANY RHYTHM YOU WANT</div>
      </div>
    </div>
    <div class="mom-track-meta">
      AUDITIONING · <strong>${provisional.name.toUpperCase()}</strong> · ${provisional.variation.toUpperCase()}
    </div>
    <p class="mom-voice-line">"This one's been waiting for you. Tap with it."</p>

    <div class="mom-liking" id="likingBlock">
      <div class="mom-liking-prompt">How does this one sit with you?</div>
      <div class="mom-liking-scale" id="likingScale">
        ${[1,2,3,4,5,6,7].map(n=>`<button class="mom-liking-dot" data-v="${n}">${n}</button>`).join('')}
      </div>
      <div class="mom-liking-anchors"><span>NOT FOR ME</span><span>YES — THIS</span></div>
    </div>
  `;

  setTimeout(()=>{
    const zone = document.getElementById('tapZone');
    const pulse = document.getElementById('tapPulse');
    const bpmEl = document.getElementById('tapBPM');
    const hintEl = document.getElementById('tapHint');
    const liking = document.getElementById('likingBlock');
    state.tapTimes = [];

    function handleTap(e){
      const rect = zone.getBoundingClientRect();
      const x = (e.clientX || (e.touches && e.touches[0]?.clientX) || rect.left + rect.width/2) - rect.left;
      const y = (e.clientY || (e.touches && e.touches[0]?.clientY) || rect.top + rect.height/2) - rect.top;
      pulse.style.left = `${x}px`;
      pulse.style.top = `${y}px`;
      pulse.classList.remove('flash');
      void pulse.offsetWidth;
      pulse.classList.add('flash');

      const now = performance.now();
      state.tapTimes.push(now);
      // keep last 6 taps
      if(state.tapTimes.length > 6) state.tapTimes.shift();
      zone.classList.add('tapping');

      if(state.tapTimes.length >= 2){
        // BPM from inter-tap intervals (median of last few)
        const intervals = [];
        for(let i=1; i<state.tapTimes.length; i++){
          intervals.push(state.tapTimes[i] - state.tapTimes[i-1]);
        }
        const sorted = [...intervals].sort((a,b)=>a-b);
        const median = sorted[Math.floor(sorted.length/2)];
        const bpm = Math.round(60000/median);
        if(bpm > 30 && bpm < 220){
          state.tapBPM = bpm;
          bpmEl.textContent = bpm;
          hintEl.textContent = state.tapTimes.length < 4
            ? 'KEEP GOING'
            : 'GOOD — HOLD THERE';
        }
      } else {
        hintEl.textContent = 'AGAIN';
      }

      // After 4+ taps, reveal liking probe
      if(state.tapTimes.length >= 4){
        liking.classList.add('show');
      }
    }

    zone.addEventListener('click', handleTap);
    zone.addEventListener('touchstart', e => { e.preventDefault(); handleTap(e); });

    // Liking dot selection
    document.querySelectorAll('.mom-liking-dot').forEach(dot=>{
      dot.addEventListener('click',()=>{
        document.querySelectorAll('.mom-liking-dot').forEach(d=>d.classList.remove('chosen'));
        dot.classList.add('chosen');
        state.likingValue = parseInt(dot.dataset.v);
        setTimeout(()=>{
          state.phase = 5;
          render();
        }, 700);
      });
    });
  }, 30);
  return root;
}

/* ============== scoring & helpers ============== */

// Provisional archetype: scoring after Phases 1 & 2; called in Phase 4 to
// frame the audition + later finalised in Phase 5 with all signals.
function scoreArchetypes(){
  const PAIR_AXES = ['warmth','density','voice','production','mode','tempo','rhythm','register','space'];

  // 1. Compute log-RT z-scores within participant for confidence weighting
  //    (Stillman 2020: long dwell = decisional conflict, not preference strength)
  const rts = state.pairLatencies.filter(x=>x).map(x=>Math.log(x));
  const mean = rts.length ? rts.reduce((a,b)=>a+b,0)/rts.length : 0;
  const sd = rts.length ? Math.sqrt(rts.reduce((s,x)=>s+(x-mean)**2,0)/rts.length) : 1;

  function confWeight(latency){
    if(!latency) return 1;
    const z = (Math.log(latency) - mean) / (sd || 1);
    if(z > 1.5) return 0.4;          // very long dwell — under-weight
    if(z > 0.5) return 0.7;          //   long dwell — modest discount
    if(z < -0.5) return 1.1;         //  fast/confident — slight boost
    return 1.0;
  }

  // 2. Score each archetype against Phase 1 pair choices
  const scores = ARCHETYPES.map(arc=>{
    let pairScore = 0, pairMax = 0;
    state.pairChoices.forEach((choice,i)=>{
      if(!choice) return;
      const axis = PAIR_AXES[i];
      const expected = arc.pairTendency[axis];
      const w = confWeight(state.pairLatencies[i]);
      pairMax += w;
      if(choice === expected) pairScore += w;
    });

    // 3. Score against Phase 2 emotion tiles (Cowen 13 / GEMS 9)
    let emoScore = 0, emoMax = 0;
    state.emotionTiles.forEach(list=>{
      if(!list) return;
      list.forEach(tile=>{
        emoMax += 1;
        if(arc.emotions.includes(tile)) emoScore += 1;
      });
    });
    if(emoMax === 0) emoMax = 1;  // avoid div0

    const pairFrac = pairMax ? pairScore/pairMax : 0;
    const emoFrac = emoScore/emoMax;
    // 70/30 weighting — pair choices are more reliable than emotion-tile multi-select
    const total = 0.7 * pairFrac + 0.3 * emoFrac;
    return { ...arc, score: total, pairFrac, emoFrac };
  });

  scores.sort((a,b)=>b.score - a.score);
  return scores;
}

function computeProvisionalArchetype(){
  const ranked = scoreArchetypes();
  return ranked[0] || ARCHETYPES[0];
}

// Time-of-day conditional Admirer line — single passive sense, disproportionate uncanny effect
function getTimeOfDayLine(){
  const hour = new Date().getHours();
  if(hour >= 23 || hour < 5)  return 'You came to me at the loneliest hour. That always means something.';
  if(hour >= 5 && hour < 8)   return 'You got here early. The morning ones know what they want.';
  if(hour >= 8 && hour < 12)  return 'Morning is honest with you. I noticed.';
  if(hour >= 12 && hour < 14) return 'The middle of the day is hard for music. You came anyway.';
  if(hour >= 14 && hour < 18) return 'Afternoon — the patient hour. You\'re not in a hurry.';
  if(hour >= 18 && hour < 21) return 'You found the gap between things. Good.';
  return 'It\'s late, but not too late. The good listening hour.';
}

function renderMirror(){
  const ranked = scoreArchetypes();
  const a = ranked[0];
  const confidence = (a.score * 100).toFixed(0);
  const timeLine = getTimeOfDayLine();

  const root = document.createElement('div');
  root.className='mirror';
  root.innerHTML = `
    <div class="mirror-eyebrow reveal-1">— A NAME FOR THIS HOUR —</div>
    <h1 class="mirror-archetype reveal-2">${a.name}</h1>
    <div class="mirror-variation reveal-3">${a.variation}</div>
    <div class="mirror-divider reveal-4"></div>
    ${a.forer.map((line,i)=>{
      const cls = i===3 ? 'dim' : '';
      return `<p class="mirror-line ${cls} reveal-${5+i}">${line}</p>`;
    }).join('')}
    <p class="mirror-line reveal-10" style="color:var(--ember);font-size:18px;margin-top:32px;">${timeLine}</p>
    <p class="mirror-handoff reveal-11">I have something for you.</p>
  `;
  return root;
}

/* ============== controls / nav ============== */

function nextPhase(){
  if(state.phase < 5){
    if(state.phase===0){ state.phase=1; }
    else if(state.phase===1){ state.phase=2; }
    else if(state.phase===2){ state.phase=3; }
    else if(state.phase===3){ state.phase=4; }
    else if(state.phase===4){ state.phase=5; }
    render();
  }
}
function prevPhase(){
  if(state.phase > 0){
    state.phase--;
    if(state.phase===1){ state.currentPair = 0; state.pairChoices = []; state.pairLatencies = []; }
    if(state.phase===2){ state.currentExcerpt = 0; state.emotionTiles = []; }
    if(state.phase===3){ state.songIndex = 0; }
    if(state.phase===4){ state.tapTimes = []; state.tapBPM = null; state.likingValue = null; }
    render();
  }
}
function reset(){
  state.phase = 0;
  state.currentPair = 0;
  state.pairChoices = [];
  state.pairLatencies = [];
  state.currentExcerpt = 0;
  state.emotionTiles = [];
  state.songIndex = 0;
  state.songs = ['','',''];
  state.tapTimes = [];
  state.tapBPM = null;
  state.likingValue = null;
  render();
}
function updateControls(){
  document.getElementById('prevBtn').disabled = state.phase===0;
  document.getElementById('nextBtn').disabled = state.phase===5;
}
function updateTimeline(){
  document.querySelectorAll('.tl-step').forEach((step,i)=>{
    step.classList.remove('active','done');
    if(i<state.phase) step.classList.add('done');
    if(i===state.phase) step.classList.add('active');
    step.onclick = ()=>{ state.phase=i; render(); };
  });
}
function updateTimer(){
  if(!state.startTime) state.startTime = Date.now();
  const elapsed = Math.floor((Date.now()-state.startTime)/1000);
  const target = 300; // 5 min
  const cur = Math.min(elapsed, target);
  const m = String(Math.floor(cur/60)).padStart(2,'0');
  const s = String(cur%60).padStart(2,'0');
  document.getElementById('timer').textContent = `${m}:${s} / 05:00`;
}
setInterval(updateTimer, 1000);

/* ============== notes drawer ============== */

function toggleNotes(){
  document.getElementById('notesDrawer').classList.toggle('open');
}
function updateNotes(){
  const note = NOTES[state.phase];
  const c = document.getElementById('notesContent');
  if(!note){ c.innerHTML=''; return; }

  // Library coverage — live archetype scoring (visible from Phase 1 onward)
  let libCoverage = '';
  if(state.phase >= 1){
    const ranked = scoreArchetypes();
    const top = ranked[0]?.score || 0;
    const margin = top - (ranked[1]?.score || 0);
    const viableCount = ranked.filter(a=>a.score > top - 0.2).length;
    const tracksLeft = viableCount * 4; // 4 variations per archetype

    libCoverage = `
      <div class="lib-coverage">
        <h4>Library Coverage</h4>
        <div class="lib-summary">
          24 tracks · <strong>${tracksLeft}</strong> still viable · margin <strong>${(margin*100).toFixed(0)}%</strong> over runner-up
        </div>
        <ul class="arc-list">
          ${ranked.map((a,i)=>{
            let cls = 'pruned';
            if(i === 0) cls = 'leading';
            else if(a.score > top - 0.2) cls = 'viable';
            return `<li class="${cls}">
              <span class="arc-name">${a.name}</span>
              <span class="arc-score">${(a.score*100).toFixed(0)}%</span>
            </li>`;
          }).join('')}
        </ul>
      </div>
    `;
  }

  // Divergence note — only on Phase 0 (orientation moment) so it's visible once
  const divergence = (state.phase === 0) ? `
    <div class="divergence">
      <h4>Divergence from project file</h4>
      <p>This redesign updates the original 6-phase profiling per the literature synthesis. Departures: archetype renaming (internal IDs preserved as <em>mellow_contemplative</em>, <em>sophisticated_melancholic</em>, etc.); GEMS-9/Cowen-13 discrete-emotion layer added on top of AVD; Spectrum word-pairs replaced with audio forced-choice (Phase 1); Textures merged into Phase 1; threshold rite (Phase 0) and Forer mirror (Phase 5) added. The Moment phase is restored from project file as Phase 4 with the prescribed Hurley liking probe.</p>
    </div>
  ` : '';

  c.innerHTML = `
    <div class="notes-eyebrow">${note.eyebrow}</div>
    <div class="notes-title">${note.title}</div>
    ${note.sections.map(s=>`
      <div class="notes-section">
        <h4>${s.h}</h4>
        <p>${s.p}</p>
      </div>
    `).join('')}
    ${divergence}
    ${libCoverage}
    ${note.refs ? `
      <div class="citations">
        <h4>Citations</h4>
        ${note.refs.map(r=>`<p>${r}</p>`).join('')}
      </div>
    ` : ''}
  `;
}

/* ============== init ============== */

render();
